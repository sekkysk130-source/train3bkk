<body>
<div class="wrap" id="app"></div>
<script>
// ================================================================
// DATA: ALL STATIONS + CONNECTIONS
// ================================================================
const LINES={
  purple:{name:'สายสีม่วง',color:'#8B5CF6',stations:[
    'คลองบางไผ่','ตลาดบางใหญ่','สามแยกบางใหญ่','บางพลู','บางรักใหญ่','บางรักน้อยท่าอิฐ','ไทรม้า','สะพานพระนั่งเกล้า','แยกนนทบุรี 1','บางกระสอ','ศูนย์ราชการนนทบุรี','กระทรวงสาธารณสุข','แยกติวานนท์','วงศ์สว่าง','บางซ่อน','เตาปูน'
  ]},
  blue:{name:'สายสีน้ำเงิน',color:'#2563EB',isLoop:true,stations:[
    'หลักสอง','บางแค','ภาษีเจริญ','เพชรเกษม 48','บางหว้า','บางไผ่','ท่าพระ','อิสรภาพ','สนามไชย','สามยอด','วัดมังกร','หัวลำโพง','สามย่าน','สีลม','ลุมพินี','คลองเตย','ศูนย์การประชุมฯ สิริกิติ์','สุขุมวิท','เพชรบุรี','พระราม 9','ศูนย์วัฒนธรรมฯ','ห้วยขวาง','สุทธิสาร','รัชดาภิเษก','ลาดพร้าว','พหลโยธิน','สวนจตุจักร','กำแพงเพชร','บางซื่อ','เตาปูน','บางโพ','บางอ้อ','บางพลัด','สิรินธร','บางยี่ขัน','บางขุนนนท์','ไฟฉาย','จรัญฯ 13'
    // loops back to ท่าพระ (index 6)
  ]},
  green_sukhumvit:{name:'สายสีเขียว (สุขุมวิท)',color:'#16A34A',stations:[
    'คูคต','แยก คปอ.','พิพิธภัณฑ์กองทัพอากาศ','รพ.ภูมิพลฯ','สะพานใหม่','สายหยุด','พหลโยธิน 59','วัดพระศรีมหาธาตุ','กรมทหารราบที่ 11','บางบัว','กรมป่าไม้','ม.เกษตรศาสตร์','เสนานิคม','รัชโยธิน','พหลโยธิน 24','ห้าแยกลาดพร้าว','หมอชิต','สะพานควาย','อารีย์','สนามเป้า','อนุสาวรีย์ชัยฯ','พญาไท','ราชเทวี','สยาม','ชิดลม','เพลินจิต','นานา','อโศก','พร้อมพงษ์','ทองหล่อ','เอกมัย','พระโขนง','อ่อนนุช','บางจาก','ปุณณวิถี','อุดมสุข','บางนา','แบริ่ง','สำโรง','ปู่เจ้า','ช้างเอราวัณ','โรงเรียนนายเรือ','ปากน้ำ','ศรีนครินทร์','แพรกษา','สายลวด','เคหะฯ'
  ]},
  green_silom:{name:'สายสีเขียว (สีลม)',color:'#16A34A',stations:[
    'สนามกีฬาแห่งชาติ','สยาม','ราชดำริ','ศาลาแดง','ช่องนนทรี','เซนต์หลุยส์','สุรศักดิ์','สะพานตากสิน','กรุงธนบุรี','วงเวียนใหญ่','โพธิ์นิมิตร','ตลาดพลู','วุฒากาศ','บางหว้า'
  ]}
};

// Interchange map: stationA_lineA -> [{stationB, lineB, walkMin}]
const XFERS=[
  {a:'เตาปูน',la:'purple',b:'เตาปูน',lb:'blue',walk:4},
  {a:'สวนจตุจักร',la:'blue',b:'หมอชิต',lb:'green_sukhumvit',walk:6},
  {a:'พหลโยธิน',la:'blue',b:'ห้าแยกลาดพร้าว',lb:'green_sukhumvit',walk:5},
  {a:'สุขุมวิท',la:'blue',b:'อโศก',lb:'green_sukhumvit',walk:4},
  {a:'สีลม',la:'blue',b:'ศาลาแดง',lb:'green_silom',walk:4},
  {a:'บางหว้า',la:'blue',b:'บางหว้า',lb:'green_silom',walk:3},
  {a:'สยาม',la:'green_sukhumvit',b:'สยาม',lb:'green_silom',walk:2},
];

// Travel time per station (default ~2 min, adjustable)
const DEFAULT_STATION_TIME=2;

// ================================================================
// SCHEDULE DATA (same freq-based generation as before)
// ================================================================
const toM=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const fM=m=>{const t=((m%1440)+1440)%1440;return`${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`};
function genTrains(first,last,slots){const r=[];const f=toM(first),l=toM(last)+(toM(last)<f?1440:0);let c=f;while(c<=l){r.push(fM(c%1440));let fq=8;for(const s of slots)if((c%1440)>=toM(s.from)&&(c%1440)<toM(s.to)){fq=s.iv;break;}c+=fq;}return[...new Set(r)].sort((a,b)=>toM(a)-toM(b));}
function calibrate(gen,anchors,deleted){const del=new Set(deleted||[]);const base=gen.filter(t=>!del.has(t));if(!anchors||!anchors.length)return base;const sa=[...anchors].sort((a,b)=>toM(a.orig)-toM(b.orig));const res=[];for(const t of base){const tm=toM(t);let bef=null,aft=null;for(const a of sa){if(toM(a.orig)<=tm)bef=a;if(toM(a.orig)>=tm&&!aft)aft=a;}let off=0;if(bef&&aft&&bef!==aft){const bo=toM(bef.orig),ao=toM(aft.orig);off=Math.round((toM(bef.real)-bo)+(((toM(aft.real)-ao)-(toM(bef.real)-bo))*((tm-bo)/(ao-bo))));}else if(bef)off=toM(bef.real)-toM(bef.orig);else if(aft)off=toM(aft.real)-toM(aft.orig);res.push(fM(tm+off));}for(const a of sa)if(!res.includes(a.real))res.push(a.real);return[...new Set(res)].sort((a,b)=>toM(a)-toM(b));}
function findNext(trains,after){const am=toM(after);for(const t of trains)if(toM(t)>=am)return t;return null;}

const SCHEDULES={
  purple_fwd:{weekday:genTrains("05:30","22:56",[{from:"05:30",to:"06:30",iv:7},{from:"06:30",to:"08:30",iv:5},{from:"08:30",to:"09:30",iv:6},{from:"09:30",to:"17:00",iv:7},{from:"17:00",to:"20:00",iv:5},{from:"20:00",to:"21:00",iv:6},{from:"21:00",to:"23:00",iv:10}]),weekend:genTrains("06:00","22:56",[{from:"06:00",to:"23:00",iv:10}])},
  purple_rev:{weekday:genTrains("06:00","23:33",[{from:"06:00",to:"06:30",iv:7},{from:"06:30",to:"08:30",iv:5},{from:"08:30",to:"09:30",iv:6},{from:"09:30",to:"17:00",iv:7},{from:"17:00",to:"20:00",iv:5},{from:"20:00",to:"21:00",iv:6},{from:"21:00",to:"23:33",iv:10}]),weekend:genTrains("06:18","23:33",[{from:"06:18",to:"23:33",iv:10}])},
  blue_cw:{weekday:genTrains("05:30","23:30",[{from:"05:30",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:7},{from:"09:30",to:"17:00",iv:5},{from:"17:00",to:"19:30",iv:4},{from:"19:30",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}]),weekend:genTrains("06:00","23:30",[{from:"06:00",to:"10:00",iv:8},{from:"10:00",to:"19:00",iv:7},{from:"19:00",to:"24:00",iv:8}])},
  blue_ccw:{weekday:genTrains("05:30","23:30",[{from:"05:30",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:7},{from:"09:30",to:"17:00",iv:5},{from:"17:00",to:"19:30",iv:4},{from:"19:30",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}]),weekend:genTrains("06:00","23:30",[{from:"06:00",to:"10:00",iv:8},{from:"10:00",to:"19:00",iv:7},{from:"19:00",to:"24:00",iv:8}])},
  green_north:{weekday:genTrains("05:15","23:50",[{from:"05:15",to:"06:00",iv:6},{from:"06:00",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:4},{from:"09:30",to:"16:00",iv:7},{from:"16:00",to:"17:00",iv:5},{from:"17:00",to:"20:00",iv:3},{from:"20:00",to:"21:00",iv:5},{from:"21:00",to:"22:00",iv:6},{from:"22:00",to:"24:00",iv:8}]),weekend:genTrains("05:55","23:50",[{from:"05:55",to:"08:00",iv:7},{from:"08:00",to:"11:00",iv:6},{from:"11:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
  green_south:{weekday:genTrains("05:31","23:50",[{from:"05:31",to:"06:00",iv:6},{from:"06:00",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:4},{from:"09:30",to:"16:00",iv:7},{from:"16:00",to:"17:00",iv:5},{from:"17:00",to:"20:00",iv:3},{from:"20:00",to:"21:00",iv:5},{from:"21:00",to:"22:00",iv:6},{from:"22:00",to:"24:00",iv:8}]),weekend:genTrains("05:55","23:50",[{from:"05:55",to:"08:00",iv:7},{from:"08:00",to:"11:00",iv:6},{from:"11:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
  green_silom_fwd:{weekday:genTrains("05:30","23:50",[{from:"05:30",to:"07:00",iv:6},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"16:00",iv:6},{from:"16:00",to:"20:00",iv:3},{from:"20:00",to:"24:00",iv:7}]),weekend:genTrains("06:00","23:50",[{from:"06:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
  green_silom_rev:{weekday:genTrains("05:30","23:50",[{from:"05:30",to:"07:00",iv:6},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"16:00",iv:6},{from:"16:00",to:"20:00",iv:3},{from:"20:00",to:"24:00",iv:7}]),weekend:genTrains("06:00","23:50",[{from:"06:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
};

// ================================================================
// ROUTE ENGINE
// ================================================================
function stationCount(line,fromSt,toSt){
  const sts=LINES[line].stations;
  const fi=sts.indexOf(fromSt),ti=sts.indexOf(toSt);
  if(fi<0||ti<0)return 999;
  if(LINES[line].isLoop){
    const n=sts.length;const fwd=(ti-fi+n)%n;const bwd=(fi-ti+n)%n;
    return{count:Math.min(fwd,bwd),dir:fwd<=bwd?'fwd':'rev',fwd,rev:bwd};
  }
  return{count:Math.abs(ti-fi),dir:ti>fi?'fwd':'rev'};
}

function getSchedKey(line,dir){
  if(line==='purple')return dir==='fwd'?'purple_fwd':'purple_rev';
  if(line==='blue')return dir==='fwd'?'blue_cw':'blue_ccw';
  if(line==='green_sukhumvit')return dir==='fwd'?'green_south':'green_north';
  if(line==='green_silom')return dir==='fwd'?'green_silom_fwd':'green_silom_rev';
  return'purple_fwd';
}

function findRoute(fromSt,fromLine,toSt,toLine){
  // Same line
  if(fromLine===toLine){
    const sc=stationCount(fromLine,fromSt,toSt);
    return[{type:'train',line:fromLine,from:fromSt,to:toSt,stations:sc.count,dir:sc.dir}];
  }
  // Different lines — find best interchange
  let best=null,bestTime=Infinity;
  for(const x of XFERS){
    // Try both directions of interchange
    for(const swap of[false,true]){
      const xa=swap?x.b:x.a, xla=swap?x.lb:x.la;
      const xb=swap?x.a:x.b, xlb=swap?x.la:x.lb;
      if(xla===fromLine&&xlb===toLine){
        const s1=stationCount(fromLine,fromSt,xa);
        const s2=stationCount(toLine,xb,toSt);
        const time=s1.count*DEFAULT_STATION_TIME+x.walk+s2.count*DEFAULT_STATION_TIME;
        if(time<bestTime){bestTime=time;best={x,xa,xla,xb,xlb,s1,s2,walk:x.walk};}
      }
    }
  }
  // Try 2 interchanges (3 legs)
  if(!best){
    for(const x1 of XFERS){
      for(const sw1 of[false,true]){
        const a1=sw1?x1.b:x1.a,la1=sw1?x1.lb:x1.la,b1=sw1?x1.a:x1.b,lb1=sw1?x1.la:x1.lb;
        if(la1!==fromLine)continue;
        for(const x2 of XFERS){
          for(const sw2 of[false,true]){
            const a2=sw2?x2.b:x2.a,la2=sw2?x2.lb:x2.la,b2=sw2?x2.a:x2.b,lb2=sw2?x2.la:x2.lb;
            if(la2!==lb1||lb2!==toLine)continue;
            const s1=stationCount(fromLine,fromSt,a1);
            const s2=stationCount(lb1,b1,a2);
            const s3=stationCount(toLine,b2,toSt);
            const time=s1.count*2+x1.walk+s2.count*2+x2.walk+s3.count*2;
            if(time<bestTime){bestTime=time;best={multi:true,legs:[
              {type:'train',line:fromLine,from:fromSt,to:a1,stations:s1.count,dir:s1.dir},
              {type:'xfer',stationA:a1,stationB:b1,walk:x1.walk},
              {type:'train',line:lb1,from:b1,to:a2,stations:s2.count,dir:s2.dir},
              {type:'xfer',stationA:a2,stationB:b2,walk:x2.walk},
              {type:'train',line:toLine,from:b2,to:toSt,stations:s3.count,dir:s3.dir}
            ]};}
          }}
      }}
  }
  if(!best)return null;
  if(best.multi)return best.legs;
  return[
    {type:'train',line:fromLine,from:fromSt,to:best.xa,stations:best.s1.count,dir:best.s1.dir},
    {type:'xfer',stationA:best.xa,stationB:best.xb,walk:best.walk},
    {type:'train',line:toLine,from:best.xb,to:toSt,stations:best.s2.count,dir:best.s2.dir}
  ];
}

// ================================================================
// STATE
// ================================================================
const STORE_KEY='bkk-transit-v4';
const SESS_KEY='bkk-transit-sess';
const _n=new Date();const _isWk=_n.getDay()===0||_n.getDay()===6;
let S={
  page:'home', // home|select_from|select_to|calc
  time:fM(_n.getHours()*60+_n.getMinutes()),
  wknd:_isWk,
  fromSt:null,fromLine:null,toSt:null,toLine:null,
  route:null,
  patterns:[null,null,null], // [{name,fromSt,fromLine,toSt,toLine}]
  cfg:{stationTime:2},
  calib:{},travelLog:{},
  showCfg:false,
  selectTarget:null, // 'from'|'to'
  searchQ:'',filterLine:null,
};

function load(){
  try{
    const r=localStorage.getItem(STORE_KEY);
    if(r){const d=JSON.parse(r);S.patterns=d.patterns||S.patterns;S.cfg=d.cfg||S.cfg;S.calib=d.calib||{};S.travelLog=d.travelLog||{};}
    const ss=localStorage.getItem(SESS_KEY);
    if(ss){const d=JSON.parse(ss);if(d.at&&Date.now()-d.at<3*3600000){Object.assign(S,{time:d.time||S.time,wknd:d.wknd??S.wknd,fromSt:d.fromSt,fromLine:d.fromLine,toSt:d.toSt,toLine:d.toLine,page:d.page||'home'});}}
  }catch(e){console.error(e);}
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify({patterns:S.patterns,cfg:S.cfg,calib:S.calib,travelLog:S.travelLog}));return true;}catch(e){flash('⚠️ บันทึกไม่ได้','err');return false;}}
function saveSess(){try{localStorage.setItem(SESS_KEY,JSON.stringify({time:S.time,wknd:S.wknd,fromSt:S.fromSt,fromLine:S.fromLine,toSt:S.toSt,toLine:S.toLine,page:S.page,at:Date.now()}));}catch{}}
function flash(m,t){const e=document.createElement('div');e.className='flash '+(t==='err'?'flash-err':'flash-ok');e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2000);}

document.addEventListener('visibilitychange',()=>{if(document.hidden)saveSess();});
window.addEventListener('pagehide',saveSess);
load();

function getSched(key){const dt=S.wknd?'weekend':'weekday';const k=`${key}_${dt}`;return calibrate(SCHEDULES[key]?.[dt]||[],(S.calib[k]||{}).anchors,(S.calib[k]||{}).deleted);}

function statusOf(w){
  if(w<=1)return{text:'วิ่งเลย!!',emoji:'🏃‍♂️💨',color:'#EF4444',bg:'rgba(239,68,68,.10)',bd:'rgba(239,68,68,.22)'};
  if(w<=3)return{text:'เดินเร็ว!',emoji:'🚶‍♂️💨',color:'#F59E0B',bg:'rgba(245,158,11,.10)',bd:'rgba(245,158,11,.22)'};
  if(w<=8)return{text:'เดินสบาย',emoji:'🚶',color:'#22C55E',bg:'rgba(34,197,94,.08)',bd:'rgba(34,197,94,.18)'};
  return{text:'รอชิลๆ',emoji:'☕',color:'#818CF8',bg:'rgba(129,140,248,.08)',bd:'rgba(129,140,248,.18)'};
}

// ================================================================
// CALCULATE JOURNEY
// ================================================================
function calcJourney(){
  if(!S.route||!S.route.length)return null;
  const legs=[];let cur=S.time;const dt=S.wknd?'weekend':'weekday';
  for(let i=0;i<S.route.length;i++){
    const step=S.route[i];
    if(step.type==='train'){
      const sk=getSchedKey(step.line,step.dir);
      const trains=getSched(sk);
      const tr=findNext(trains,cur);
      if(!tr)return{err:`ไม่มีรถ${LINES[step.line].name}แล้ว`};
      const wait=toM(tr)-toM(cur);
      const tKey=`${step.line}_${step.dir}`;
      const log=S.travelLog[tKey];
      const travel=log?.length?Math.round(log.slice(-5).reduce((s,e)=>s+e.mins,0)/log.slice(-5).length):step.stations*(S.cfg.stationTime||2);
      const arrive=fM(toM(tr)+travel);
      legs.push({t:'train',line:step.line,lc:LINES[step.line].color,lineName:LINES[step.line].name,
        from:step.from,to:step.to,stations:step.stations,
        atStation:i===0?S.time:undefined,trainTime:tr,wait:i===0?wait:undefined,
        arrive,travel,schedKey:sk,travelKey:tKey,
        logCount:log?.length||0,isAvg:log?.length>0});
      cur=arrive;
    } else if(step.type==='xfer'){
      const arrSt=cur;const ready=fM(toM(cur)+step.walk);
      // Find schedule for next train leg
      const nextStep=S.route[i+1];
      if(!nextStep)break;
      const nsk=getSchedKey(nextStep.line,nextStep.dir);
      const nTrains=getSched(nsk);
      const nxt=findNext(nTrains,ready);
      if(!nxt)return{err:'ไม่มีรถสายต่อไป'};
      const w=toM(nxt)-toM(ready);
      legs.push({t:'xfer',stationA:step.stationA,stationB:step.stationB,arriveStation:arrSt,walk:step.walk,ready,nextTrain:nxt,wait:w,status:statusOf(w),nextSched:nsk});
      cur=ready;
    }
  }
  if(!legs.length)return null;
  const lastLeg=legs.filter(l=>l.t==='train').pop();
  return{legs,total:toM(lastLeg.arrive)-toM(S.time),dep:S.time,arr:lastLeg.arrive};
}

// ================================================================
// ACTIONS
// ================================================================
window.startNewRoute=()=>{S.selectTarget='from';S.searchQ='';S.filterLine=null;S.page='select';render();};
window.selectStation=(st,line)=>{
  if(S.selectTarget==='from'){S.fromSt=st;S.fromLine=line;S.selectTarget='to';S.searchQ='';render();}
  else{S.toSt=st;S.toLine=line;S.route=findRoute(S.fromSt,S.fromLine,S.toSt,S.toLine);S.page='calc';saveSess();render();}
};
window.usePattern=(i)=>{
  const p=S.patterns[i];if(!p)return;
  S.fromSt=p.fromSt;S.fromLine=p.fromLine;S.toSt=p.toSt;S.toLine=p.toLine;
  S.route=findRoute(S.fromSt,S.fromLine,S.toSt,S.toLine);S.page='calc';saveSess();render();
};
window.saveAsPattern=()=>{
  const idx=S.patterns.findIndex(p=>!p);if(idx<0)return flash('เต็มแล้ว (3 เส้นทาง)','err');
  const name=prompt('ตั้งชื่อเส้นทาง',`${S.fromSt}→${S.toSt}`);if(!name)return;
  S.patterns[idx]={name,fromSt:S.fromSt,fromLine:S.fromLine,toSt:S.toSt,toLine:S.toLine};
  save();flash('⭐ บันทึกแล้ว');render();
};
window.deletePattern=(i)=>{S.patterns[i]=null;save();render();};

// Edit popups (same as before)
window.editDepart=(sched,currentTime)=>{
  document.querySelector('.overlay')?.remove();
  const dt=S.wknd?'weekend':'weekday';const k=`${sched}_${dt}`;
  const base=SCHEDULES[sched]?.[dt]||[];const cd=S.calib[k]||{anchors:[],deleted:[]};
  let closest=base[0],minD=9999;for(const b of base){if(!cd.deleted?.includes(b)){const d=Math.abs(toM(b)-toM(currentTime));if(d<minD){minD=d;closest=b;}}}
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="panel">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-size:15px;font-weight:700">📌 แก้เวลารถออก</div><button class="btn" onclick="this.closest('.overlay').remove()" style="padding:5px 10px;border-radius:7px;background:rgba(100,116,139,.1);color:#94A3B8;font-size:12px">✕</button></div>
    <div style="text-align:center;margin-bottom:14px"><div style="font-size:10px;color:#94A3B8">ตาราง</div><div class="mono" style="font-size:26px;font-weight:700">${currentTime}</div></div>
    <div style="margin-bottom:14px"><div style="font-size:11px;color:#4ADE80;margin-bottom:4px;font-weight:600">เวลาจริง:</div><input type="time" id="ed_val" value="${currentTime}" style="width:100%;font-size:26px;padding:6px 14px;background:rgba(11,14,24,.5);border:2px solid rgba(34,197,94,.3);border-radius:10px;color:#4ADE80;outline:none;font-family:monospace;text-align:center"></div>
    <div style="display:flex;gap:6px"><button class="btn" onclick="doSaveD('${sched}','${closest}')" style="flex:1;padding:10px;border-radius:9px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ADE80;font-size:13px;font-weight:700">📌 บันทึก</button><button class="btn" onclick="doDelD('${sched}','${closest}')" style="padding:10px 14px;border-radius:9px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#FCA5A5;font-size:13px;font-weight:700">🗑️</button></div>
  </div>`;
  document.body.appendChild(ov);
};

window.doSaveD=(sched,orig)=>{const v=document.getElementById('ed_val')?.value;if(!v)return;const dt=S.wknd?'weekend':'weekday';const k=`${sched}_${dt}`;if(!S.calib[k])S.calib[k]={anchors:[],deleted:[]};S.calib[k].anchors=[...S.calib[k].anchors.filter(a=>a.orig!==orig),{orig,real:v}];save();document.querySelector('.overlay')?.remove();flash('📌 บันทึกแล้ว');render();};
window.doDelD=(sched,orig)=>{const dt=S.wknd?'weekend':'weekday';const k=`${sched}_${dt}`;if(!S.calib[k])S.calib[k]={anchors:[],deleted:[]};S.calib[k].deleted=[...new Set([...(S.calib[k].deleted||[]),orig])];save();document.querySelector('.overlay')?.remove();flash('🗑️ ลบแล้ว');render();};

window.editArrive=(tk,dep,arr,fr,to)=>{
  document.querySelector('.overlay')?.remove();
  const log=S.travelLog[tk]||[];const defT=S.cfg.stationTime||2;
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="panel">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-size:15px;font-weight:700">🕐 แก้เวลาถึง</div><button class="btn" onclick="this.closest('.overlay').remove()" style="padding:5px 10px;border-radius:7px;background:rgba(100,116,139,.1);color:#94A3B8;font-size:12px">✕</button></div>
    <div style="font-size:11px;color:#94A3B8;margin-bottom:8px">${fr} → ${to} ${log.length?`• เฉลี่ย <strong style="color:#60A5FA">${Math.round(log.slice(-5).reduce((s,e)=>s+e.mins,0)/log.slice(-5).length)}m</strong> (${log.length}x)`:''}</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div class="tiny">ออก</div><div class="mono" style="font-size:18px;font-weight:700">${dep}</div></div><div style="text-align:right"><div class="tiny">ถึง (ตอนนี้)</div><div class="mono" style="font-size:18px;font-weight:700;color:#4ADE80">${arr}</div></div></div>
    <div style="margin-bottom:14px"><div style="font-size:11px;color:#60A5FA;margin-bottom:4px;font-weight:600">เวลาถึงจริง:</div><input type="time" id="ed_val" value="${arr}" style="width:100%;font-size:26px;padding:6px 14px;background:rgba(11,14,24,.5);border:2px solid rgba(96,165,250,.3);border-radius:10px;color:#60A5FA;outline:none;font-family:monospace;text-align:center"></div>
    <button class="btn" onclick="doSaveA('${tk}','${dep}')" style="width:100%;padding:10px;border-radius:9px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:#60A5FA;font-size:13px;font-weight:700">🕐 บันทึก</button>
    ${log.length?`<div style="margin-top:10px"><div style="font-size:9px;color:#475569;margin-bottom:3px">ประวัติ:</div><div style="display:flex;flex-wrap:wrap;gap:2px">${log.slice(-8).reverse().map(e=>`<span class="chip">${e.mins}m ${e.date||''}</span>`).join('')}</div><button class="btn" onclick="delete S.travelLog['${tk}'];save();document.querySelector('.overlay')?.remove();flash('ลบแล้ว');render()" style="margin-top:4px;padding:3px 8px;border-radius:4px;background:rgba(239,68,68,.06);color:#FCA5A5;font-size:9px">ลบประวัติ</button></div>`:''}
  </div>`;
  document.body.appendChild(ov);
};

window.doSaveA=(tk,dep)=>{const v=document.getElementById('ed_val')?.value;if(!v)return;const mins=((toM(v)-toM(dep))%1440+1440)%1440;if(mins<=0||mins>120){flash('เวลาไม่ถูกต้อง','err');return;}const today=new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short'});if(!S.travelLog[tk])S.travelLog[tk]=[];S.travelLog[tk].push({depart:dep,arrive:v,mins,date:today});if(S.travelLog[tk].length>20)S.travelLog[tk]=S.travelLog[tk].slice(-20);save();document.querySelector('.overlay')?.remove();flash(`🕐 ${mins}m บันทึกแล้ว`);render();};

// Clock
setInterval(()=>{const e=document.getElementById('ck');if(e){const n=new Date();e.textContent=fM(n.getHours()*60+n.getMinutes())+':'+String(n.getSeconds()).padStart(2,'0');}},1000);
setInterval(render,30000);
render();
</script>
</body>
</html>
